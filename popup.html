<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      min-height: 120px;
      font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0eeeb;
      color: #1c1917;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px 18px 12px;
      background: linear-gradient(180deg, #fff 0%, #faf8f5 100%);
      border-bottom: 1px solid #e7e2dc;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1c1917;
    }
    .header-sub {
      margin-top: 4px;
      font-size: 12px;
      color: #78716c;
      line-height: 1.35;
    }
    .download-banner[hidden] { display: none !important; }
    .download-banner { padding: 12px 14px; background: #fff7ed; border-bottom: 1px solid #fed7aa; }
    .download-banner .banner-title { font-size: 13px; font-weight: 600; color: #9a3412; }
    .download-banner .banner-detail { font-size: 12px; color: #44403c; margin-top: 4px; line-height: 1.45; }
    .download-banner .banner-path { font-size: 11px; color: #57534e; margin-top: 6px; word-break: break-all; }
    .download-banner .banner-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .download-banner .btn-ghost {
      background: #fff;
      border: 1px solid #d6d3d1;
      color: #44403c;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }
    .download-banner .btn-ghost:hover { background: #fafaf9; }
    .download-banner .btn-danger {
      background: #fff;
      border: 1px solid #f87171;
      color: #b91c1c;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }
    .download-banner .btn-danger:hover { background: #fef2f2; }
    .content {
      padding: 12px 14px 10px;
      max-height: 420px;
      overflow-y: auto;
    }
    .empty {
      text-align: center;
      padding: 28px 16px 24px;
      font-size: 13px;
      color: #78716c;
      line-height: 1.55;
    }
    .empty strong {
      color: #44403c;
      font-weight: 600;
    }
    .stream-list { display: flex; flex-direction: column; gap: 12px; }
    .stream-item {
      background: #fff;
      border: 1px solid #e7e2dc;
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .stream-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a8a29e;
      margin-bottom: 6px;
    }
    .stream-url {
      font-size: 11px;
      color: #57534e;
      word-break: break-all;
      line-height: 1.45;
      font-family: ui-monospace, "Cascadia Code", "Segoe UI Mono", monospace;
    }
    .field {
      margin-top: 10px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #57534e;
      margin-bottom: 5px;
    }
    .row { display: flex; gap: 8px; align-items: stretch; }
    .filename-input {
      flex: 1;
      min-width: 0;
      background: #faf8f5;
      border: 1px solid #d6d3d1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #1c1917;
      font-family: inherit;
    }
    .filename-input::placeholder { color: #a8a29e; }
    .filename-input:focus {
      outline: none;
      border-color: #c2410c;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.12);
    }
    .filename-input:read-only { background: #f5f5f4; color: #78716c; }
    .dl-btn {
      background: #c2410c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .dl-btn:hover { background: #9a3412; }
    .dl-btn:disabled { background: #d6d3d1; color: #a8a29e; cursor: not-allowed; }
    .status {
      font-size: 12px;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      line-height: 1.4;
    }
    .status.ok { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .status.err { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .status.pending { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
    .status-line { font-size: 12px; }
    .status-sub {
      font-size: 11px;
      color: #57534e;
      margin-top: 6px;
      word-break: break-all;
    }
    .status-bar {
      margin-top: 8px;
      height: 3px;
      background: #e0f2fe;
      border-radius: 2px;
      overflow: hidden;
    }
    .status-bar.indeterminate span {
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #c2410c, #fb923c);
      border-radius: 2px;
      animation: bar-slide 1.1s ease-in-out infinite;
    }
    @keyframes bar-slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(320%); }
    }
    .path-row {
      margin-top: 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      line-height: 1.4;
    }
    #path-line { color: #57534e; flex: 1; word-break: break-all; }
    #path-line.path-missing { color: #b91c1c; }
    a#open-options { color: #c2410c; font-weight: 600; text-decoration: none; white-space: nowrap; }
    a#open-options:hover { text-decoration: underline; }
    .download-banner { max-height: 200px; overflow-y: auto; }
    .queue-meta { font-size: 10px; color: #a8a29e; margin-bottom: 8px; }
    .job-card {
      background: #fff;
      border: 1px solid #e7e2dc;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .job-title { font-size: 12px; font-weight: 600; color: #44403c; }
    .job-detail { font-size: 11px; color: #57534e; margin-top: 4px; line-height: 1.35; }
    .job-path { font-size: 10px; color: #78716c; margin-top: 4px; word-break: break-all; }
    .footer {
      border-top: 1px solid #e7e2dc;
      padding: 10px 16px 12px;
      font-size: 11px;
      color: #a8a29e;
      text-align: center;
      background: #faf8f5;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-title">HLS Grabber</div>
      <div class="header-sub" id="context-line">Names use the page title by default. Edit if you want.</div>
      <div class="path-row">
        <div id="path-line">…</div>
        <a href="#" id="open-options">Options</a>
      </div>
    </div>
    <div id="download-banner" class="download-banner" hidden></div>
    <div id="content" class="content">
      <div class="empty">Loading</div>
    </div>
    <div class="footer">4 files at a time, rest line up. Same queue from any tab.</div>
  </div>
  <script src="yt-page-helpers.js"></script>
  <script src="popup.js"></script>
</body>
</html>

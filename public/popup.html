<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="dark light">
  <link rel="stylesheet" href="../style/popup.css">
</head>
<body>
  <div class="popup-root">
    <header class="topbar">
      <div class="topbar-main">
        <div class="brand-row">
          <div class="brand-title">Stuff Grabber</div>
          <span class="queue-pill" id="queue-pill">Idle</span>
        </div>
        <p class="brand-sub" id="context-line">Type a file name or use page title defaults.</p>
      </div>
      <div class="settings-row">
        <div id="path-line" class="path-line">Loading save location…</div>
        <a href="#" id="open-options" class="settings-link">Options</a>
      </div>
    </header>

    <section id="download-banner" class="jobs-panel" hidden></section>
    <main id="content" class="streams-panel">
      <div class="empty">Loading</div>
    </main>

    <footer class="footer">Up to 4 parallel downloads. Queue is shared across tabs.</footer>
  </div>
  <script src="scripts/yt-page-helpers.js"></script>
  <script src="scripts/popup.js"></script>
</body>
</html>
